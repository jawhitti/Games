<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>GITBOY — the team ran through all of this to get here</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#0a0608; overflow:hidden;
    font-family:"Courier New", monospace; color:#d33; }
  #wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { image-rendering:pixelated; image-rendering:crisp-edges; background:#140a0e;
    box-shadow:0 0 0 3px #2a1015, 0 0 40px #000 inset; max-width:100vw; max-height:100vh; }
  #hint { position:absolute; left:50%; bottom:8px; transform:translateX(-50%); font-size:12px;
    color:#7a3038; letter-spacing:1px; white-space:nowrap; text-shadow:0 1px 0 #000; user-select:none; }
  #hint b { color:#e55; }
</style>

<body>
<div id="wrap"><canvas id="c" width="416" height="234"></canvas></div>
<div id="hint">
  <b>ENTER</b> take/release control &nbsp;&bull;&nbsp; MOVE <b>&larr; &rarr;</b>/<b>A D</b> &nbsp;&bull;&nbsp;
  JUMP <b>SPACE</b>/<b>W</b> &nbsp;&bull;&nbsp; PUNCH <b>J</b> &nbsp;&bull;&nbsp; KICK <b>K</b> &nbsp;&bull;&nbsp; <b>R</b> replay &nbsp;&bull;&nbsp; <b>M</b> mute
</div>

<!-- Generated by build-level.mjs. If missing, the game falls back to a demo run. -->
<script src="level-data.js" onerror="window.__noLevel=1"></script>

<script>
(() => {
"use strict";
const cv=document.getElementById("c"), g=cv.getContext("2d"), W=cv.width, H=cv.height;
g.imageSmoothingEnabled=false;
function fit(){ const s=Math.max(1,Math.min(Math.floor(innerWidth/W),Math.floor(innerHeight/H)));
  cv.style.width=(W*s)+"px"; cv.style.height=(H*s)+"px"; }
addEventListener("resize",fit); fit();

// ---- input --------------------------------------------------------------
const keys={}, pressed={};
addEventListener("keydown",e=>{ const k=e.key.toLowerCase(); if(!keys[k])pressed[k]=true; keys[k]=true;
  SFX.resume(); if(k==="m") SFX.toggleMute();
  if([" ","arrowup","arrowdown","arrowleft","arrowright","enter"].includes(k))e.preventDefault(); });
addEventListener("keyup",e=>{ keys[e.key.toLowerCase()]=false; });
addEventListener("pointerdown",()=>SFX.resume());
addEventListener("focus",()=>SFX.resume());
addEventListener("visibilitychange",()=>{ if(!document.hidden) SFX.resume(); });
const down=(...k)=>k.some(x=>keys[x]);
const hit =(...k)=>k.some(x=>pressed[x]);

// ---- sound + chiptune (synthesized, no files) ---------------------------
const SFX = (()=>{
  let ctx, master, gate, throb, musicGain, started=false, muted=false, musicOn=true, lastSpark=0;
  let step=0, nextTime=0, bpm=142;
  const nf=m=>440*Math.pow(2,(m-69)/12);
  // Am - F - C - G, one bar each (8 eighth-notes/bar)
  const PROG=[
    {bass:nf(45),tri:[nf(69),nf(72),nf(76)]}, {bass:nf(41),tri:[nf(65),nf(69),nf(72)]},
    {bass:nf(48),tri:[nf(72),nf(76),nf(79)]}, {bass:nf(43),tri:[nf(67),nf(71),nf(74)]},
  ];
  const LEAD=[0,2,1,2,0,1,2,-1];
  function noise(sec){ const n=ctx.sampleRate*sec, b=ctx.createBuffer(1,n,ctx.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1; return b; }
  function tone(type,freq,t,dur,vol){ const o=ctx.createOscillator(); o.type=type; o.frequency.value=freq;
    const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g); g.connect(musicGain); o.start(t); o.stop(t+dur+0.02); }
  function kick(t){ const o=ctx.createOscillator(); o.type="sine"; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12);
    const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.6,t+0.005); g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
    o.connect(g); g.connect(musicGain); o.start(t); o.stop(t+0.18); }
  function snare(t){ const ns=ctx.createBufferSource(); ns.buffer=noise(0.2); const hp=ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=1400;
    const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.3,t+0.005); g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
    ns.connect(hp); hp.connect(g); g.connect(musicGain); ns.start(t); ns.stop(t+0.2); }
  function hat(t,vol){ const ns=ctx.createBufferSource(); ns.buffer=noise(0.05); const hp=ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=6500;
    const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.003); g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
    ns.connect(hp); hp.connect(g); g.connect(musicGain); ns.start(t); ns.stop(t+0.06); }
  function scheduleStep(st,t){ const bar=Math.floor(st/8)%4, s=st%8, ch=PROG[bar];
    if(s%2===0) tone("triangle",ch.bass,t,0.19,0.5);
    if(s%4===3) tone("triangle",ch.bass*2,t,0.1,0.32);          // little bass hop
    const li=LEAD[s]; if(li>=0) tone("square",ch.tri[li],t,0.16,0.24);
    if(s===0||s===4) kick(t);
    if(s===2||s===6) snare(t);
    hat(t,(s%2===0)?0.05:0.1);
  }
  function scheduler(){ if(!started||ctx.state!=="running"||!musicOn) return;
    if(nextTime<ctx.currentTime) nextTime=ctx.currentTime+0.05;
    const spb=60/bpm/2;                                          // seconds per eighth
    while(nextTime<ctx.currentTime+0.12){ scheduleStep(step,nextTime); step=(step+1)%32; nextTime+=spb; } }
  function ensure(){
    if(started) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    ctx=new AC(); master=ctx.createGain(); master.gain.value=0.85; master.connect(ctx.destination);
    // engine bus
    gate=ctx.createGain(); gate.gain.value=0; gate.connect(master);
    throb=ctx.createGain(); throb.gain.value=0.7; throb.connect(gate);
    const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=210; lp.Q.value=5; lp.connect(throb);
    const o1=ctx.createOscillator(); o1.type="sawtooth"; o1.frequency.value=57; o1.connect(lp);
    const o2=ctx.createOscillator(); o2.type="square"; o2.frequency.value=43; o2.connect(lp);
    const ns=ctx.createBufferSource(); ns.buffer=noise(2); ns.loop=true;
    const nlp=ctx.createBiquadFilter(); nlp.type="lowpass"; nlp.frequency.value=130;
    const ng=ctx.createGain(); ng.gain.value=0.4; ns.connect(nlp); nlp.connect(ng); ng.connect(throb);
    const lfo=ctx.createOscillator(); lfo.type="sine"; lfo.frequency.value=6.5;
    const lg=ctx.createGain(); lg.gain.value=0.28; lfo.connect(lg); lg.connect(throb.gain);
    // music bus
    musicGain=ctx.createGain(); musicGain.gain.value=muted?0:0.16; musicGain.connect(master);
    o1.start(); o2.start(); ns.start(); lfo.start(); started=true;
    setInterval(scheduler,25);
  }
  return {
    resume(){ ensure(); if(ctx&&ctx.state==="suspended") ctx.resume(); },
    toggleMute(){ muted=!muted; if(started){ const t=ctx.currentTime;
      gate.gain.setTargetAtTime(muted?0:gate.gain.value,t,0.05); musicGain.gain.setTargetAtTime(muted?0:0.16,t,0.05); } return muted; },
    isMuted:()=>muted,
    setEngine(level){ if(!started||muted) return; gate.gain.setTargetAtTime(level,ctx.currentTime,0.12); },
    sparkle(){ if(!started||muted) return; const now=performance.now(); if(now-lastSpark<55) return; lastSpark=now;
      const t=ctx.currentTime, base=1250+Math.random()*950;
      for(let k=0;k<2;k++){ const o=ctx.createOscillator(); o.type="triangle"; const gn=ctx.createGain();
        const f=base*(k?2:1); o.frequency.setValueAtTime(f,t); o.frequency.exponentialRampToValueAtTime(f*1.5,t+0.08);
        gn.gain.setValueAtTime(0.0001,t); gn.gain.exponentialRampToValueAtTime(0.08,t+0.005); gn.gain.exponentialRampToValueAtTime(0.0001,t+0.14);
        o.connect(gn); gn.connect(master); o.start(t); o.stop(t+0.16); } },
    explosion(){ if(!started||muted) return; const t=ctx.currentTime;
      // long body: noise through a lowpass that sweeps way down over >1s
      const ns=ctx.createBufferSource(); ns.buffer=noise(1.6);
      const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.setValueAtTime(900,t); lp.frequency.exponentialRampToValueAtTime(70,t+1.2);
      const gn=ctx.createGain(); gn.gain.setValueAtTime(0.0001,t); gn.gain.exponentialRampToValueAtTime(0.55,t+0.03);
      gn.gain.exponentialRampToValueAtTime(0.14,t+0.5); gn.gain.exponentialRampToValueAtTime(0.0001,t+1.4);
      ns.connect(lp); lp.connect(gn); gn.connect(master); ns.start(t); ns.stop(t+1.6);
      // sub-bass rumble tail
      const o=ctx.createOscillator(); o.type="sine"; o.frequency.setValueAtTime(92,t); o.frequency.exponentialRampToValueAtTime(34,t+1.0);
      const og=ctx.createGain(); og.gain.setValueAtTime(0.0001,t); og.gain.exponentialRampToValueAtTime(0.5,t+0.02); og.gain.exponentialRampToValueAtTime(0.0001,t+1.2);
      o.connect(og); og.connect(master); o.start(t); o.stop(t+1.25);
      // low-square grit for the initial blast
      const o2=ctx.createOscillator(); o2.type="square"; o2.frequency.setValueAtTime(120,t); o2.frequency.exponentialRampToValueAtTime(48,t+0.45);
      const o2g=ctx.createGain(); o2g.gain.setValueAtTime(0.0001,t); o2g.gain.exponentialRampToValueAtTime(0.18,t+0.02); o2g.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
      o2.connect(o2g); o2g.connect(master); o2.start(t); o2.stop(t+0.6); },
    merge(){ if(!started||muted) return; const t=ctx.currentTime;
      [0,4,7,12].forEach((s,i)=>{ const o=ctx.createOscillator(); o.type="triangle"; o.frequency.value=523.25*Math.pow(2,s/12);
        const g=ctx.createGain(); const tt=t+i*0.05; g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(0.11,tt+0.01); g.gain.exponentialRampToValueAtTime(0.0001,tt+0.18);
        o.connect(g); g.connect(master); o.start(tt); o.stop(tt+0.2); }); },
    planeBoom(){ if(!started||muted) return; const t=ctx.currentTime;
      const ns=ctx.createBufferSource(); ns.buffer=noise(0.5);
      const lp=ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.setValueAtTime(2200,t); lp.frequency.exponentialRampToValueAtTime(300,t+0.35);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.38,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
      ns.connect(lp); lp.connect(g); g.connect(master); ns.start(t); ns.stop(t+0.5);
      const o=ctx.createOscillator(); o.type="square"; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(90,t+0.3);
      const og=ctx.createGain(); og.gain.setValueAtTime(0.0001,t); og.gain.exponentialRampToValueAtTime(0.24,t+0.01); og.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
      o.connect(og); og.connect(master); o.start(t); o.stop(t+0.4); },
    firework(){ if(!started||muted) return; const t=ctx.currentTime;
      const ns=ctx.createBufferSource(); ns.buffer=noise(0.3);
      const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.setValueAtTime(2600,t); bp.frequency.exponentialRampToValueAtTime(700,t+0.25); bp.Q.value=1.2;
      const gn=ctx.createGain(); gn.gain.setValueAtTime(0.0001,t); gn.gain.exponentialRampToValueAtTime(0.2,t+0.01); gn.gain.exponentialRampToValueAtTime(0.0001,t+0.3);
      ns.connect(bp); bp.connect(gn); gn.connect(master); ns.start(t); ns.stop(t+0.32);
      const o=ctx.createOscillator(); o.type="triangle"; o.frequency.setValueAtTime(1400+Math.random()*600,t); o.frequency.exponentialRampToValueAtTime(500,t+0.18);
      const og=ctx.createGain(); og.gain.setValueAtTime(0.0001,t); og.gain.exponentialRampToValueAtTime(0.07,t+0.005); og.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
      o.connect(og); og.connect(master); o.start(t); o.stop(t+0.22); },
    grunt(){ if(!started||muted) return; const t=ctx.currentTime;
      const o=ctx.createOscillator(); o.type="square"; o.frequency.setValueAtTime(140+Math.random()*40,t); o.frequency.exponentialRampToValueAtTime(85,t+0.09);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.1,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.14); },
    yeah(){ if(!started||muted) return; const t=ctx.currentTime;   // crowd "yeah!" — detuned voices rising
      for(let i=0;i<4;i++){ const o=ctx.createOscillator(); o.type=i%2?"sawtooth":"square"; const det=1+(i-1.5)*0.013;
        o.frequency.setValueAtTime(180*det,t); o.frequency.linearRampToValueAtTime(330*det,t+0.12); o.frequency.linearRampToValueAtTime(300*det,t+0.34);
        const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=950; bp.Q.value=0.8;
        const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.06,t+0.03); g.gain.exponentialRampToValueAtTime(0.0001,t+0.4);
        o.connect(bp); bp.connect(g); g.connect(master); o.start(t); o.stop(t+0.42); } },
    ooh(){ if(!started||muted) return; const t=ctx.currentTime;   // group "ooh"
      [["sine",0.09],["triangle",0.05]].forEach(([ty,v])=>{ const o=ctx.createOscillator(); o.type=ty;
        o.frequency.setValueAtTime(300,t); o.frequency.linearRampToValueAtTime(520,t+0.24);
        const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=720; bp.Q.value=1.4;
        const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(v,t+0.05); g.gain.exponentialRampToValueAtTime(0.0001,t+0.34);
        o.connect(bp); bp.connect(g); g.connect(master); o.start(t); o.stop(t+0.36); }); },
    missile(){ if(!started||muted) return; const t=ctx.currentTime;
      const o=ctx.createOscillator(); o.type="sawtooth"; o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(210,t+0.25);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.06,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+0.3); },
    tada(){ if(!started||muted) return; const t=ctx.currentTime;   // Apple-ish major-chord chime
      [523.25,659.25,783.99,1046.5].forEach((f,i)=>{ ["triangle","sine"].forEach((ty,j)=>{
        const o=ctx.createOscillator(); o.type=ty; o.frequency.value=f*(j?1.003:1); const tt=t+i*0.02;
        const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(0.085,tt+0.04); g.gain.exponentialRampToValueAtTime(0.0001,tt+1.3);
        o.connect(g); g.connect(master); o.start(tt); o.stop(tt+1.35); }); });
      for(let k=0;k<3;k++){ const o=ctx.createOscillator(); o.type="triangle"; o.frequency.value=1568*(1+k*0.5); const tt=t+0.06+k*0.05;
        const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(0.05,tt+0.01); g.gain.exponentialRampToValueAtTime(0.0001,tt+0.25);
        o.connect(g); g.connect(master); o.start(tt); o.stop(tt+0.28); } },
    bossHorn(){ if(!started||muted) return; const t=ctx.currentTime, f=220;   // single low note: two quick honks, then a long blast
      const blast=(tt,dur)=>{ const o=ctx.createOscillator(); o.type="sawtooth"; o.frequency.setValueAtTime(f,tt);
        const o2=ctx.createOscillator(); o2.type="square"; o2.frequency.setValueAtTime(f,tt);   // same pitch, harmonics keep it audible
        const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(0.24,tt+0.02); g.gain.setValueAtTime(0.24,tt+Math.max(0.03,dur-0.06)); g.gain.exponentialRampToValueAtTime(0.0001,tt+dur);
        o.connect(g); o2.connect(g); g.connect(master); o.start(tt); o2.start(tt); o.stop(tt+dur+0.02); o2.stop(tt+dur+0.02); };
      blast(t,0.12); blast(t+0.18,0.12); blast(t+0.42,0.55); },
    stopMusic(){ musicOn=false; if(started) musicGain.gain.setTargetAtTime(0,ctx.currentTime,0.4); },
    startMusic(){ musicOn=true; if(started&&!muted) musicGain.gain.setTargetAtTime(0.16,ctx.currentTime,0.3); },
    victory(){ if(!started||muted) return; const t=ctx.currentTime;   // little triumphant jingle
      const seq=[[0,0],[4,0.13],[7,0.26],[12,0.39],[7,0.58],[12,0.7]];
      seq.forEach(([s,dt])=>{ const tt=t+dt;
        const o=ctx.createOscillator(); o.type="square"; o.frequency.value=523.25*Math.pow(2,s/12);
        const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(0.17,tt+0.02); g.gain.exponentialRampToValueAtTime(0.0001,tt+0.32);
        o.connect(g); g.connect(master); o.start(tt); o.stop(tt+0.34);
        const b=ctx.createOscillator(); b.type="triangle"; b.frequency.value=130.81*Math.pow(2,(s%12)/12);
        const bg=ctx.createGain(); bg.gain.setValueAtTime(0.0001,tt); bg.gain.exponentialRampToValueAtTime(0.14,tt+0.02); bg.gain.exponentialRampToValueAtTime(0.0001,tt+0.32);
        b.connect(bg); bg.connect(master); b.start(tt); b.stop(tt+0.34); }); },
  };
})();

// ---- color --------------------------------------------------------------
const hx=h=>{ h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; };
const rh=r=>'#'+r.map(v=>Math.max(0,Math.min(255,v|0)).toString(16).padStart(2,'0')).join('');
const darken =(h,f)=>rh(hx(h).map(v=>v*f));
const lighten=(h,f)=>rh(hx(h).map(v=>v+(255-v)*f));
const palette=b=>({base:b,dark:darken(b,0.6),light:lighten(b,0.34)});

// ---- level --------------------------------------------------------------
const FALLBACK={ repo:"demo/gitboy", counts:{total:5,closed:2,open:3,openActive:1,idle:2,commits:16}, span:{days:14},
  heroes:[{id:"bug",name:"Bug Squad",color:"#c92b2b",count:2,real:true},{id:"feat",name:"Feature Team",color:"#2f7fd8",count:3,real:true}],
  lead:"feat",
  obstacles:[
    {n:1,title:"Null crash on startup",state:"closed",kind:"truck",hero:"bug",diff:2,t:0.05,endT:0.14,engage:true,resolves:true},
    {n:2,title:"Add dark mode",state:"open",kind:"truck",hero:"feat",diff:1,t:0.2,endT:0.28,engage:true,resolves:false},
    {n:3,title:"Old idea nobody did",state:"open",kind:"truck",hero:"feat",diff:1,t:0.4,endT:0.4,engage:false,resolves:false},
    {n:4,title:"CORS misconfig",state:"closed",kind:"truck",hero:"bug",diff:1,t:0.6,endT:0.66,engage:true,resolves:true},
    {n:5,title:"Realtime sync someday",state:"open",kind:"truck",hero:"feat",diff:3,t:0.82,endT:0.82,engage:false,resolves:false},
  ],
  stars:[{sha:"a1",t:0.1},{sha:"b2",t:0.3},{sha:"c3",t:0.55},{sha:"d4",t:0.8}],
  planes:[{n:11,title:"Add feature",state:"merged",t:0.25},{n:12,title:"Risky refactor",state:"rejected",t:0.5},{n:13,title:"WIP",state:"open",t:0.75}],
};
const LV=(window.GITBOY_LEVEL&&!window.__noLevel)?window.GITBOY_LEVEL:FALLBACK;
LV.heroes.forEach(h=>h.pal=palette(h.color));
const heroById=Object.fromEntries(LV.heroes.map(h=>[h.id,h]));

// ---- tempo & timeline ---------------------------------------------------
const GROUND_Y=1000, camY=GROUND_Y-(H-52), START_X=150;
const RUNSPEED=3.6, DURATION_SEC=58, TRACK_LEN=RUNSPEED*60*DURATION_SEC;
const MINGAP=22, CLUSTER_GAP=24, MAXTRUCKS=10;
const TRUCK_ROOF=GROUND_Y-22, TS=16;

const OBS=LV.obstacles.map(o=>({ ...o }));
const STARS_SRC=(LV.stars||[]).map(s=>({ ...s }));
for(const o of OBS){ o.spawnX=START_X+o.t*TRACK_LEN; }
OBS.sort((a,b)=>a.spawnX-b.spawnX);
let prev=-1e9; for(const o of OBS){ if(o.spawnX<prev+MINGAP) o.spawnX=prev+MINGAP; prev=o.spawnX; }
for(const s of STARS_SRC) s.x=START_X+s.t*TRACK_LEN;
STARS_SRC.sort((a,b)=>a.x-b.x);
// PRs -> airplanes in the sky
const PLANES=(LV.planes||[]).map(p=>({ ...p, spawnX:START_X+p.t*TRACK_LEN, launched:false }));
PLANES.sort((a,b)=>a.spawnX-b.spawnX);
const RELEASES=(LV.releases||[]).map(r=>({ ...r, x:START_X+r.t*TRACK_LEN, hit:false, raise:0 }));

    safeShots=safeShots.filter(sh=>!sh.dead);

  } else {

  }
}

// planes fly in from the LEFT, ~125% of truck pace, fire a missile at a truck, then peel off (merged/open) or blow up (rejected)
function launchPlane(p){ joinEvent(p.author); planesActive.push({ n:p.n, title:p.title, state:p.state,
  x:-30, y:26+Math.random()*44, vx:RUNSPEED*0.4+0.35+Math.random()*0.4, wob:Math.random()*6.28, fired:false, counted:false, phase:"fly", dead:false }); }
function fireMissile(pl){
  let best=null,bd=1e9; for(const o of OBS){ if(!o.spawned||o.done)continue; const sx=o.x-camX; if(sx<-10||sx>W+10)continue; const d=Math.abs(sx-pl.x); if(d<bd){bd=d;best=o;} }
  const tx=best?(best.x-camX):pl.x+8, ty=GROUND_Y-camY-12, ang=Math.atan2(ty-pl.y,tx-pl.x), sp=3.4;
  missiles.push({x:pl.x,y:pl.y+3,vx:Math.cos(ang)*sp,vy:Math.max(0.6,Math.sin(ang)*sp),life:75,color:pl.state==="merged"?"#5cd06a":"#ff5a4a"});
  SFX.missile();
}
function explodePlane(pl){
  prRejected++; shake=Math.max(shake,9); SFX.explosion(); if(Math.random()<0.6)SFX.grunt(); lastEvent="PR #"+pl.n+" rejected"; gib(pl.x+camX,pl.y+camY,12);
  for(let i=0;i<32;i++) fx.push({x:pl.x+camX,y:pl.y+camY,vx:(Math.random()*2-1)*3.7,vy:(Math.random()*2-1)*3.3-0.4,life:26+Math.random()*22,color:Math.random()<0.4?"#ffd76e":Math.random()<0.6?"#e33":"#666"});
  for(let i=0;i<9;i++) fx.push({x:pl.x+camX,y:pl.y+camY,vx:(Math.random()*2-1)*2,vy:1+Math.random()*2.2,life:38,color:"#555"});
}
function dispatchTruck(o, active){
  joinEvent(o.author);
  o.spawned=true; o.fade=0; o.x=camX+W*0.95+active*26;      // fade in at the right edge
  if(o.engage){ o.phase="approach"; o.vx=RUNSPEED*0.4; }    // rolls in a bit, then boarded
  else        { o.phase="pass";     o.vx=RUNSPEED*0.5; }    // logged, never addressed
  if(o.boss){ SFX.bossHorn(); banner="⚠ BOSS APPROACHING"; bannerT=170; shake=Math.max(shake,6); }
}
function updatePlanes(frontX){
  for(const p of PLANES){ if(p.launched)continue; if(frontX<p.spawnX)break; if(planesActive.length>=10)break; p.launched=true; launchPlane(p); }
  for(const pl of planesActive){
    pl.x+=pl.vx; pl.y+=Math.sin(time*0.05+pl.wob)*0.25;
    if(!pl.fired && pl.state!=="open" && pl.x>W*0.4){ pl.fired=true; fireMissile(pl);
      if(pl.state==="merged" && !pl.counted){ pl.counted=true; prMerged++; SFX.merge(); lastEvent="PR #"+pl.n+" merged"; } }
    if(pl.state==="rejected" && pl.fired && pl.x>W*0.6 && pl.phase==="fly"){ pl.phase="boom"; explodePlane(pl); pl.dead=true; }
    if(pl.x>W+38){ if(pl.state==="open"&&!pl.counted){pl.counted=true;prFlew++;} pl.dead=true; }
  }
  const groundS=GROUND_Y-camY-8;
  for(const m of missiles){ m.x+=m.vx; m.y+=m.vy; m.vy+=0.05; m.life--;
    if(m.y>=groundS){ m.dead=true; shake=Math.max(shake,3);
      for(let i=0;i<13;i++) fx.push({x:m.x+camX,y:(groundS)+camY,vx:(Math.random()*2-1)*2.5,vy:-Math.random()*2.6,life:18+Math.random()*12,color:Math.random()<0.5?m.color:"#ffd"}); } }
  planesActive=planesActive.filter(pl=>!pl.dead);
  missiles=missiles.filter(m=>!m.dead && m.life>0);
}
function drawPlane(pl){                                       // side-view airplane, flying right
  const x=Math.round(pl.x), y=Math.round(pl.y);
  const col=pl.state==="merged"?"#5fbf6a":pl.state==="rejected"?"#d24a4a":"#9aa7b0", dk=darken(col,0.7);
  g.globalAlpha=0.16; for(let i=1;i<=6;i++) px(x-10-i*4,y-1,3,2,"#cfd6da"); g.globalAlpha=1;   // contrail behind
  g.fillStyle=col; g.beginPath(); g.moveTo(x-9,y);   g.lineTo(x-13,y-6); g.lineTo(x-6,y); g.fill();   // vertical tail fin
  px(x-8,y-1,16,4,"#e6ebed"); px(x-8,y-1,16,1,"#ffffff"); px(x-8,y+2,16,1,dk);                        // fuselage
  g.fillStyle=col; g.beginPath(); g.moveTo(x+8,y-1); g.lineTo(x+14,y+1); g.lineTo(x+8,y+3); g.fill();  // nose cone
  g.fillStyle="#b8c0c6"; g.beginPath(); g.moveTo(x-1,y+1); g.lineTo(x-9,y+7); g.lineTo(x+2,y+3); g.fill(); // lower wing
  g.fillStyle="#cdd4d8"; g.beginPath(); g.moveTo(x-1,y+1); g.lineTo(x-8,y-5); g.lineTo(x+2,y-1); g.fill(); // upper wing
  px(x+3,y-1,3,2,"#39454f");                                  // cockpit
  px(x-4,y,7,1,col);                                          // livery stripe
  g.fillStyle=col; g.font="6px 'Courier New',monospace"; g.textAlign="center"; g.fillText("#"+pl.n,x,y-8); g.textAlign="left";
}
function drawMissile(m){ const x=Math.round(m.x), y=Math.round(m.y);
  g.globalAlpha=0.7; g.fillStyle="#ffcf7a"; px(x-3,y-1,3,2); px(x-5,y-1,2,1); g.globalAlpha=1;   // flame trail
  g.fillStyle=m.color; px(x-1,y-1,4,2); px(x+3,y-1,1,2); }                                        // body + tip

function startAttack(a,move){ if(a.act!=="idle")return;
  if(move==="kick"){ a.act="kick"; a.actT=KICK_T; a.vx=a.face*4.2; a.vy=Math.min(a.vy,-1.8); } else { a.act="punch"; a.actT=PUNCH_T; } }
function doJump(a){ if(a.onGround){ a.vy=-JUMP; a.onGround=false; burst(a.x,a.y-1,a.pal.light,5,1.6); burst(a.x,a.y-2,"#b81f1f",3,1.2); } }
function pickRider(o){ const own=actors.find(a=>a.id===o.hero&&!a.riding&&!a.controlled); if(own)return own;
  const free=actors.filter(a=>!a.riding&&!a.controlled); if(!free.length)return null;
  return free.reduce((p,q)=>Math.abs(q.x-o.x)<Math.abs(p.x-o.x)?q:p,free[0]); }

// ---- update -------------------------------------------------------------
function update(){
  time++;
  if(hit("r")) return reset();
  if(hit("enter")){ if(mode==="auto"){ mode="play"; lead.controlled=true; lastEvent="you grabbed "+lead.name; }
    else { mode="auto"; lead.controlled=false; lastEvent="back to auto-run"; } }

  const runners=actors.filter(a=>!a.riding);
  const frontX=(runners.length?Math.max(...runners.map(a=>a.x)):Math.max(...actors.map(a=>a.x)));
  const bossFight=BOSS&&BOSS.phase==="battle";              // slow everything to a crawl during the boss
  if(!finished) anchorX+=RUNSPEED*(bossFight?0.15:1);

  for(const a of actors) updateActor(a,frontX);

  // ---- commit stars flung off the front runner ----
  const fh=runners.length?runners.reduce((p,q)=>q.x>p.x?q:p,runners[0]):actors[0];
  let spawned=0, lastCommit=null;
  while(starPtr<STARS_SRC.length && STARS_SRC[starPtr].x<=frontX){ const src=STARS_SRC[starPtr]; if(spawned<18) flingStar(fh,src); joinEvent(src.login); lastCommit=src; starPtr++; thrown++; spawned++; }
  if(spawned>=6 && time-lastOoh>90){ SFX.ooh(); lastOoh=time; }    // a shower of commits -> "ooh"
  if(lastCommit && tickerHold<=0){ tickerText=lastCommit.sha+"  "+(lastCommit.msg||""); tickerCol=lastCommit.bot?"#9fe0ff":"#cbb98a"; }  // HUD names the accepted commit (one per frame)
  if(tickerHold>0) tickerHold--;

  // ---- dispatch trucks (in timeline order) ----
  let active=OBS.filter(o=>o.spawned&&!o.done).length;
  if(BOSS && BOSS.phase==="pending" && frontX>=BOSS.spawnX){ dispatchTruck(BOSS,active); active++; }   // boss jumps the queue -> always on time
  for(const o of OBS){
    if(o.phase!=="pending") continue;
    if(frontX<o.spawnX) break;                    // sorted: nothing later is due
    if(active>=MAXTRUCKS) break;
    dispatchTruck(o,active); active++;
  }

  // ---- update spawned trucks ----
  for(const o of OBS){
    if(!o.spawned||o.done) continue;
    o.fade=Math.min(1,(o.fade||0)+0.08);
    o.x+=o.vx; o.wheel+=Math.abs(o.vx)*0.18;
    if(o.phase==="approach"){
      if(o.x-camX<=W*0.70){                          // ~25% across -> the crew jumps on
        let crew;
        if(o.cap>1) crew=actors.filter(a=>!a.riding&&!a.controlled).slice(0,o.cap);   // boss: dogpile
        else { const r=pickRider(o); crew=r?[r]:[]; }
        if(crew.length){ crew.forEach((r,i)=>{ r.riding=o; r.rideSlot=i; }); o.riders=crew; o.hadRider=true; o.phase="battle"; o.timer=0;
          if(o.boss){ banner="BOSS  #"+o.n; bannerT=130; SFX.yeah(); lastEvent="BOSS #"+o.n+" -- all hands!"; } else lastEvent=crew[0].name+" boards #"+o.n; }
        else o.vx=RUNSPEED;                          // hover by the pack until crew free up
      }
    } else if(o.phase==="battle"){
      o.vx+=((bossFight?RUNSPEED*0.15:RUNSPEED)-o.vx)*0.1;    // keep pace with the (slowed) pack
      o.timer++;
      if(o.timer%14===0) o.riders.forEach(r=>{ r.act="punch"; r.actT=PUNCH_T; });
      if(o.timer%8===0) burst(o.x+8,o.roof+6,"#ffd",3,1.6);
      if(o.boss && o.timer>16 && o.timer%16===0){          // boss takes a beating: small blasts before it goes
        burst(o.x+(Math.random()*2-1)*22, o.roof+Math.random()*12, pick(["#ffd76e","#e33"]), 8, 2.6); gib(o.x+(Math.random()*2-1)*18,o.roof+6,4); shake=Math.max(shake,4); SFX.planeBoom(); }
      if(o.timer>=o.dur){
        const crew=o.riders;
        if(o.resolves){ o.phase="boom"; o.boomT=0; SFX.explosion(); const big=o.boss?2:1; shake=9*big;
          burst(o.x,GROUND_Y-14,"#ffd76e",26*big,4); burst(o.x,GROUND_Y-12,"#e33",20*big,3.6); debris(o.x,GROUND_Y-14,12*big);
          gib(o.x,o.roof+8,o.boss?26:10); addSplat(o.x);
          crew.forEach(r=>{ r.riding=null; r.rideSlot=0; r.vy=-6.5; r.act="idle"; });
          if(o.boss){ SFX.yeah(); banner="BOSS DEFEATED"; bannerT=200; } else if(o.size>=3) SFX.yeah();
          popCard(o,"RESOLVED"); setTicker(o,"RESOLVED","#8fd8a0"); lastEvent=crew[0].name+" resolved #"+o.n;
        } else { o.phase="out"; o.vx=RUNSPEED*0.5;    // worked on, but never resolved -> hop off
          crew.forEach(r=>{ r.riding=null; r.rideSlot=0; r.vy=-6; r.act="idle"; });
          popCard(o,"STILL OPEN"); lastEvent=crew[0].name+" dropped #"+o.n;
        }
        o.riders=null;
      }
    } else if(o.phase==="boom"){ o.boomT++;
      if(o.boss){ if(o.boomT%4===0 && o.boomT<48){ const bx=o.x+(Math.random()*2-1)*o.bw*0.5;   // chain of blasts down the length of the rig
          burst(bx,o.roof+Math.random()*16,pick(["#ffd76e","#e33","#fff"]),15,3.3); gib(bx,o.roof+8,5); shake=Math.max(shake,7); SFX.explosion(); }
        if(o.boomT>48){ o.done=true; resolved++; } }
      else if(o.boomT>18){ o.done=true; resolved++; } }
    else { // pass / out : roll through and exit left
      if(o.x<camX-80){ o.done=true; if(o.phase==="out") oBattled++; else oIdle++; }
    }
  }

  updatePlanes(frontX);
  if(!finished && Math.random()<0.006) SFX.grunt();

  // release checkpoints -> banner + confetti when the pack passes
  for(const r of RELEASES){ if(!r.hit && frontX>r.x){ r.hit=true; banner="RELEASED  "+r.tag; bannerT=150; SFX.tada(); shake=Math.max(shake,5);
    for(let i=0;i<24;i++) fx.push({x:r.x,y:GROUND_Y-44-Math.random()*34,vx:(Math.random()*2-1)*3,vy:(Math.random()*2-1)*3-1,life:30+Math.random()*22,color:pick(FWC)}); } }
  if(bannerT>0) bannerT--;
  zoom+=((bossFight?1.3:1)-zoom)*0.05;                     // zoom in on the boss brawl

  if(!finished && frontX>FLAG_X){ finished=true; endStage="safe"; shake=6; SFX.stopMusic();
    safe={ x:Math.max(...actors.map(a=>a.x))+58, t:0, dur:170, exploding:false, boomT:0 }; safeShots=[]; banner="CRACK THE VAULT"; bannerT=170; }
  if(finished){

  }
  for(const r of RELEASES) if(r.hit && r.raise<1) r.raise=Math.min(1,r.raise+0.07);      // checkpoint flags raise on hit

  for(const p of fx){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--; if(p.gib&&p.y>=GROUND_Y){ addSplat(p.x); p.life=0; } } fx=fx.filter(p=>p.life>0);
  for(const s of stars){ s.x+=s.vx; s.y+=s.vy; s.vy+=s.bot?0.03:0.16; if(s.bot) s.x+=Math.sin((time+s.spin*10)*0.15)*0.3; s.spin+=0.3; s.life--; } stars=stars.filter(s=>s.life>0);

function updateActor(a,frontX){
  // ---- riding a truck: pinned on the roof, throwing punches ----
  if(a.riding){
    const o=a.riding, n=o.riders?o.riders.length:1, tx=o.x + ((a.rideSlot||0)-(n-1)/2)*(o.boss?26:12);  // fan riders across the roof
    a.x+=(tx-a.x)*0.45; a.y+=(o.roof-a.y)*0.45; a.vy=0; a.onGround=true; a.face=1;
    if(a.act!=="idle"){ a.actT--; if(a.actT<=0)a.act="idle"; }
    a.animT=0; return;
  }
  a.jumpCd--;
  if(a.controlled && !finished){
    const acc=a.onGround?1.0:0.6;
    if(down("arrowleft","a")){ a.vx-=acc; a.face=-1; }
    if(down("arrowright","d")){ a.vx+=acc; a.face=1; }
    if(!down("arrowleft","a","arrowright","d")&&a.onGround) a.vx*=0.72;
    a.vx=Math.max(-4.2,Math.min(4.2,a.vx));
    if(hit(" ","arrowup","w")) doJump(a);
    if(!down(" ","arrowup","w")&&a.vy<-3) a.vy=-3;
    if(hit("j","z")) startAttack(a,"punch");
    if(hit("k","x")) startAttack(a,"kick");
  } else {
    let desired=anchorX-a.lag;
    const dx=desired-a.x;
    a.vx+=(Math.max(-0.6,Math.min(1.0,dx*0.05))*RUNSPEED*1.7 - a.vx)*0.2;
    if(dx>0.2) a.face=1;
    // ~half the crew take the high road: hop up onto platforms when one comes up
    if(a.prefersHigh && a.onGround && a.jumpCd<=0){
      for(const p of platforms){ if(a.x>p.x0-26 && a.x<p.x0+8 && a.y>p.y+2){ doJump(a); a.jumpCd=22; break; } }
    } else if(inZone(a.x)&&a.onGround&&a.jumpCd<=0&&Math.random()<0.045){ doJump(a); a.jumpCd=18; }
  }
  if(a.act!=="idle"){ a.actT--; if(a.act==="kick") a.vy=Math.min(MAXFALL,a.vy+GRAV*0.4);
    if(a.actT<=0||(a.act==="kick"&&a.onGround)) a.act="idle"; }
  a.vy=Math.min(MAXFALL,a.vy+GRAV); a.x+=a.vx; a.y+=a.vy;
  if(a.y>=GROUND_Y){ if(a.vy>4)a.squash=1; a.y=GROUND_Y; a.vy=0; a.onGround=true; } else a.onGround=false;
  if(a.controlled||a.prefersHigh) collidePlatforms(a);   // only the high-road crew (and you) mount platforms
  if(a.x<8) a.x=8;
  if(a.onGround&&Math.abs(a.vx)>0.3) a.animT+=Math.abs(a.vx)*0.12; else a.animT=0;
  if(a.squash>0) a.squash-=0.12;
}
function collidePlatforms(a){ const feet=a.y,half=5;

  PLANES.forEach(p=>p.launched=false); RELEASES.forEach(r=>{ r.hit=false; r.raise=0; });
  endStage="run"; safe=null; safeShots=[]; finishFlagX=0; flagRaise=0; joins=[]; seenNames.clear();
  anchorX=START_X; mode="auto"; finished=false; finishT=0; camX=0; thrown=0; starPtr=0; resolved=oBattled=oIdle=0; prMerged=prRejected=prFlew=0;

  g.fillStyle="#e6c36a"; g.fillText("OPEN "+(oBattled+oIdle)+"/"+LV.counts.open,W*0.62,11);
  g.fillStyle="#f5d76e"; g.fillText("★"+thrown+"/"+LV.counts.commits,W*0.79,11);
  g.textAlign="right"; g.fillStyle=mode==="play"?"#ff8a8a":"#7a9ad8"; g.fillText((SFX.isMuted()?"muted ":"")+(mode==="play"?"[YOU]":"[AUTO]"),W-6,11); g.textAlign="left";
  // bottom ticker: always visible; shows the last CONQUERED issue (neutral label until the first one)
  { const line=tickerText||("▶  "+LV.repo); px(0,H-24,W,13,"rgba(10,6,8,0.82)");
    g.font="8px 'Courier New',monospace"; g.textAlign="left"; g.fillStyle=tickerText?tickerCol:"#7a6a6e";
    let t=line; while(g.measureText(t).width>W-12 && t.length>6) t=t.slice(0,-1); if(t!==line)t=t.slice(0,-1)+"…";
    g.fillText(t,6,H-15); }
  const fxp=Math.max(...actors.map(a=>a.x)), p=Math.max(0,Math.min(1,(fxp-START_X)/(FLAG_X-START_X)));
  px(6,H-8,W-12,3,"#2a141a"); px(6,H-8,(W-12)*p,3,"#c92b2b");
  if(lastEvent){ g.font="7px 'Courier New',monospace"; g.fillStyle="#9a6a72"; g.textAlign="center"; g.fillText(lastEvent,W/2,23); g.textAlign="left"; }
  g.font="8px 'Courier New',monospace"; g.textAlign="left";               // "xxx joined..." feed (left, scrolling up)
  for(const j of joins){ g.globalAlpha=Math.min(1,j.life/45); g.fillStyle="hsl("+j.hue+" 85% 66%)"; g.fillText(j.name+" joined…", 8, j.y); } g.globalAlpha=1;
  if(banner && bannerT>0){ const a=Math.min(1,bannerT/30); g.globalAlpha=a; g.textAlign="center";
    px(W/2-72,30,144,16,"rgba(10,6,8,0.85)"); g.font="12px 'Courier New',monospace";
    g.fillStyle=banner.includes("BOSS")?"#ff6a6a":"#f5d76e"; g.fillText(banner,W/2,42); g.textAlign="left"; g.globalAlpha=1; }
  if(endStage==="win"){                                        // phase: fireworks + stats
    const al=Math.min(1,finishT/30); g.globalAlpha=0.62*al; px(0,0,W,H,"#0a0608"); g.globalAlpha=1;
    for(const r of fireRockets){ g.fillStyle=r.color; g.fillRect(r.x-1,r.y-2,2,3); g.globalAlpha=0.5; g.fillStyle="#ffcf9a"; g.fillRect(r.x-0.5,r.y+2,1,3); g.globalAlpha=1; }
    for(const p of fireParts){ g.globalAlpha=Math.min(1,p.life/30); g.fillStyle=p.color; const s=(p.size||1)+1; g.fillRect((p.x-s/2)|0,(p.y-s/2)|0,s,s); } g.globalAlpha=1;
    g.textAlign="center";
    g.fillStyle="#e33"; g.font="18px 'Courier New',monospace"; g.fillText("LEVEL COMPLETE",W/2,H/2-34);
    g.fillStyle="#e7d7c0"; g.font="9px 'Courier New',monospace"; g.fillText(LV.repo+"   ("+(LV.span?.days||"?")+" days)",W/2,H/2-16);
    g.fillStyle="#8fd8a0"; g.fillText(resolved+" issues battled to resolution (boom)",W/2,H/2);
    g.fillStyle="#e6c36a"; g.fillText(oBattled+" worked but still open, "+oIdle+" never addressed",W/2,H/2+12);
    g.fillStyle="#f5d76e"; g.fillText(thrown+" commits flung as stars",W/2,H/2+24);
    g.fillStyle="#9ab7d8"; g.fillText(prMerged+" PRs merged, "+prRejected+" shot down",W/2,H/2+36);
    g.fillStyle="#9a6a72"; g.font="8px 'Courier New',monospace"; g.fillText("(the open issues are still out there...)",W/2,H/2+52); g.textAlign="left";
  } else if(endStage==="parade"){                               // phase: open issues roar past
    g.globalAlpha=0.28; px(0,0,W,H,"#0a0608"); g.globalAlpha=1;  // light dim so the parade shows through
    const a=Math.min(1,(finishT-300)/70); g.globalAlpha=a; g.textAlign="center";
    g.fillStyle="#e7d7c0"; g.font="17px 'Courier New',monospace"; g.fillText("To be continued...",W/2,H*0.4);
    g.fillStyle="#e6c36a"; g.font="8px 'Courier New',monospace"; g.fillText(LV.counts.open+" issues still open",W/2,H*0.4+16);
    g.fillStyle="#9a6a72"; g.fillText("press R to run it again",W/2,H*0.4+30); g.textAlign="left"; g.globalAlpha=1;
  }
}

function render(){
  drawBG();
  g.save();
  if(zoom!==1){ g.translate(W/2,H*0.62); g.scale(zoom,zoom); g.translate(-W/2,-H*0.62); }
  const ox=shake>0?(Math.random()*2-1)*shake:0, oy=shake>0?(Math.random()*2-1)*shake:0;
  g.translate(Math.round(ox),Math.round(oy));
  drawGround();
  for(const sp of splats){ const x=sp.x-camX; if(x<-10||x>W+10)continue; const y=GROUND_Y-camY-2;
    g.globalAlpha=0.8; g.fillStyle=sp.c; px(x-sp.s,y,sp.s*2,2); px(x-sp.s*0.6,y-1,sp.s,1); px(x+sp.s*0.3,y+1,2,1); g.globalAlpha=1; }
  drawPlatforms();
  for(const r of RELEASES) drawCheckpoint(r);
  if(endStage==="win"||endStage==="parade") drawFlag();
  for(const o of OBS) drawTruck(o);
  for(const p of parade) drawTruck(p);
  if(safe) drawSafe();
  for(const sh of safeShots) px(sh.x-camX-2,sh.y-camY-1,4,2,"#ffd");
  for(const s of stars) drawStar(s);
  for(const a of [...actors].sort((p,q)=>p.x-q.x)) drawGuy(a);
  for(const pl of planesActive) drawPlane(pl);
  for(const m of missiles) drawMissile(m);
  for(const p of fx){ g.globalAlpha=Math.max(0,p.life/24); px(p.x-camX,p.y-camY,2,2,p.color); } g.globalAlpha=1;
  drawCards(); g.restore(); drawHUD();
}

let acc=0,last=performance.now(); const STEP=1000/60;
function loop(now){ acc+=now-last; last=now; let guard=0; while(acc>=STEP&&guard++<5){ update(); acc-=STEP; } render(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
