    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">Yours from the start (in hand). Send</tspan><tspan x="48" y="363">them into the deck to reach Rachel for</tspan><tspan x="48" y="404">an INSTANT WIN. Beats a machine above</tspan><tspan x="48" y="445">them, dies to one below, whiffs on the</tspan><tspan x="48" y="486">wrong sidekick. Sending them costs a</tspan><tspan x="48" y="527">prize.</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“It's too bad she won't live. But then</tspan><tspan x="375" y="780">again, who does?”</tspan></text>
