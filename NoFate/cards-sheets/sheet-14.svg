    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">Deckard starts in your hand; Rachel is lost</tspan><tspan x="70" y="956">in the deck. Bring them home together for an</tspan><tspan x="70" y="990">INSTANT WIN.</tspan></text>
  </g></g>
