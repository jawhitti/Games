    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">REACTIVE: when any card surfaces (except</tspan><tspan x="48" y="363">a global -- those fire instantly), the</tspan><tspan x="48" y="404">holder may fling it to the bottom of the</tspan><tspan x="48" y="445">deck; the active player then flips</tspan><tspan x="48" y="486">again. On a Terminator only the TOP one</tspan><tspan x="48" y="527">goes -- the rest of the would-be convoy</tspan><tspan x="48" y="568">resolves normally. The clock does NOT</tspan><tspan x="48" y="609">advance, so a yeeted sidekick stays in</tspan><tspan x="48" y="650">play (saved for a reunion, or denied a</tspan><tspan x="48" y="691">rival).</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“You will be sent back. Involuntarily. (12</tspan><tspan x="375" y="780">Monkeys.)”</tspan></text>
