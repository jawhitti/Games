    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">On your Fish: after you peek your sight</tspan><tspan x="48" y="363">band, REORDER those cards however you</tspan><tspan x="48" y="404">like. Weapon: set your hero directly</tspan><tspan x="48" y="445">above your sidekick (reunion), or your</tspan><tspan x="48" y="486">sidekick atop your own next draw.</tspan><tspan x="48" y="527">Defense: star-cross a rival pair, or</tspan><tspan x="48" y="568">pull your sidekick off a terminator.</tspan></text>
