    <text x="150" y="92" fill="#fff" font-size="34" font-weight="bold" letter-spacing="2">YOUR PAIR</text>
    <text x="375" y="258" fill="#141414" font-size="46" font-weight="bold" text-anchor="middle">Newt</text>
    <text x="375" y="322" fill="#6a6258" font-size="34" font-style="italic" text-anchor="middle">&amp;</text>
    <text x="375" y="388" fill="#141414" font-size="46" font-weight="bold" text-anchor="middle">Ellen Ripley</text>
    <path d="M 375 669.0 C 510.0 581.3 442.5 486.8 375 567.8 C 307.5 486.8 240.0 581.3 375 669.0 Z" fill="#c2185b"/>
    <rect x="48" y="852" width="654" height="150" rx="16" fill="#c2185b1a" stroke="#c2185b" stroke-width="2.5"/>
    <text x="70" y="888" fill="#c2185b" font-size="22" font-weight="bold" letter-spacing="2">HOW YOU WIN</text>
    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">Ellen Ripley starts in your hand; Newt is</tspan><tspan x="70" y="956">lost in the deck. Bring them home together</tspan><tspan x="70" y="990">for an INSTANT WIN.</tspan></text>
  </g></g>
