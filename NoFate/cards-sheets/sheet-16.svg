    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">Your machine — you start with five, and</tspan><tspan x="48" y="363">they’re REUSABLE: after hauling the card</tspan><tspan x="48" y="404">below home it returns to your hand to</tspan><tspan x="48" y="445">replant. It buddy-chains down through</tspan><tspan x="48" y="486">other machines and drags the first</tspan><tspan x="48" y="527">non-machine home — the whole convoy to</tspan><tspan x="48" y="568">the TOP machine’s owner; the buddies it</tspan><tspan x="48" y="609">sweeps up are out of commission.</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“It can’t be bargained with. It can’t be</tspan><tspan x="375" y="780">reasoned with.”</tspan></text>
    <rect x="48" y="852" width="654" height="150" rx="16" fill="#d32f2f1a" stroke="#d32f2f" stroke-width="2.5"/>
    <text x="70" y="888" fill="#d32f2f" font-size="22" font-weight="bold" letter-spacing="2">SCORING</text>
    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">No points. Plant it; on surface its convoy</tspan><tspan x="70" y="956">drags the card below home to the top</tspan><tspan x="70" y="990">machine.</tspan></text>
  </g></g>
