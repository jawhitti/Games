    <text x="150" y="68" fill="#fff" font-size="34" font-weight="bold" letter-spacing="2">HERO</text>
    <path d="M 690 78.0 C 720.0 58.5 705.0 37.5 690 55.5 C 675.0 37.5 660.0 58.5 690 78.0 Z" fill="#c2185b"/>
    <text x="375" y="230" fill="#141414" font-size="48" font-weight="bold" text-anchor="middle"><tspan x="375" y="230">Ellen Ripley</tspan></text>
    <line x1="48" y1="294" x2="702" y2="294" stroke="#cfc9bb" stroke-width="2"/>
    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">Yours from the start (in hand). Send</tspan><tspan x="48" y="363">them into the deck to reach Newt for an</tspan><tspan x="48" y="404">INSTANT WIN. Beats a machine above them,</tspan><tspan x="48" y="445">dies to one below, whiffs on the wrong</tspan><tspan x="48" y="486">sidekick. Sending them costs a prize.</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“Get away from her, you bitch!”</tspan></text>
    <rect x="48" y="852" width="654" height="150" rx="16" fill="#268a4e1a" stroke="#268a4e" stroke-width="2.5"/>
    <text x="70" y="888" fill="#268a4e" font-size="22" font-weight="bold" letter-spacing="2">SCORING</text>
    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">No points on its own -- send it onto your</tspan><tspan x="70" y="956">sidekick for an INSTANT WIN (sending costs a</tspan><tspan x="70" y="990">prize). Worth nothing if never used.</tspan></text>
  </g></g>
