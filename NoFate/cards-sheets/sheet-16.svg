    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">Your other half, lost deep in the deck.</tspan><tspan x="48" y="363">They walk home alone for points, or your</tspan><tspan x="48" y="404">hero Ellen Ripley reaches them for the</tspan><tspan x="48" y="445">reunion. Keep them in play until you can</tspan><tspan x="48" y="486">win.</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“Get away from her, you bitch!”</tspan></text>
    <rect x="48" y="852" width="654" height="150" rx="16" fill="#268a4e1a" stroke="#268a4e" stroke-width="2.5"/>
    <text x="70" y="888" fill="#268a4e" font-size="22" font-weight="bold" letter-spacing="2">SCORING</text>
    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">Leaves on the 1-2-4-8 ladder by order (x2 if</tspan><tspan x="70" y="956">captured); or your hero reaches her for an</tspan><tspan x="70" y="990">INSTANT WIN.</tspan></text>
  </g></g>
