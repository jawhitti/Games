    <text x="48" y="374" fill="#2a2a2a" font-size="31"><tspan x="48" y="374">On your Fish: cut, peek a card, and</tspan><tspan x="48" y="415">DESTROY it outright (out of the game).</tspan><tspan x="48" y="456">Anything but a protectee, a hero, or the</tspan><tspan x="48" y="497">Timequake -- so you can vaporize a rival</tspan><tspan x="48" y="538">machine, John Connor, or a fat prize</tspan><tspan x="48" y="579">before someone banks it.</tspan></text>
