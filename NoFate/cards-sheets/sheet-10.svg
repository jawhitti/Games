    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">Worth -1. Playable from hand: bury</tspan><tspan x="48" y="363">(re-displace) anywhere in the Future via</tspan><tspan x="48" y="404">a cut.</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“Some poor kid yanked through time, asking</tspan><tspan x="375" y="780">for his mom. Pass him along -- gently.”</tspan></text>
    <rect x="48" y="852" width="654" height="150" rx="16" fill="#9c5a221a" stroke="#9c5a22" stroke-width="2.5"/>
    <text x="70" y="888" fill="#9c5a22" font-size="22" font-weight="bold" letter-spacing="2">SCORING</text>
    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">-1 at game end if still in hand. Playable:</tspan><tspan x="70" y="956">bury it in the Future.</tspan></text>
