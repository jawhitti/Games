  <rect x="6" y="6" width="738" height="1038" rx="36" fill="#fbfaf7" stroke="#1a1a1a" stroke-width="6"/>
  <g clip-path="url(#clip-11-3)">
    <rect x="0" y="0" width="750" height="1050" fill="#1f9aa8" opacity="0.09"/>
    <g opacity="0.20"><polygon points="417,352 282.6,545.2 371.64,545.2 333,688 467.4,494.8 378.36,494.8" fill="#1f9aa8"/></g>
    <rect x="0" y="0" width="750" height="150" fill="#1f9aa8"/>
    <polygon points="96.5,33 62.9,81.3 85.16,81.3 75.5,117 109.1,68.7 86.84,68.7" fill="#ffffff"/>
    
    <text x="150" y="68" fill="#fff" font-size="34" font-weight="bold" letter-spacing="2">GLOBAL</text>
    <text x="716" y="58" fill="#fff" font-size="30" font-weight="bold" text-anchor="end">x1</text>
    <text x="375" y="230" fill="#141414" font-size="48" font-weight="bold" text-anchor="middle"><tspan x="375" y="230">Pass the Watch</tspan></text>
    <line x1="48" y1="294" x2="702" y2="294" stroke="#cfc9bb" stroke-width="2"/>
    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">Every player cuts and lifts a card of</tspan><tspan x="48" y="363">their choice and shows it to the player</tspan><tspan x="48" y="404">on their left, then it goes back. So</tspan><tspan x="48" y="445">everyone ends up seeing TWO cards: the</tspan><tspan x="48" y="486">one they chose and the one handed to</tspan><tspan x="48" y="527">them from their right.</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“Word travels down the line in the dark.”</tspan></text>
    <rect x="48" y="852" width="654" height="150" rx="16" fill="#1f9aa81a" stroke="#1f9aa8" stroke-width="2.5"/>
    <text x="70" y="888" fill="#1f9aa8" font-size="22" font-weight="bold" letter-spacing="2">SCORING</text>
    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">No points -- fires the instant it surfaces;</tspan><tspan x="70" y="956">cannot be taken, sent, looted, or yeeted.</tspan></text>
  </g></g>
