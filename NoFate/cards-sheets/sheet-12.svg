  <rect x="6" y="6" width="738" height="1038" rx="36" fill="#fbfaf7" stroke="#1a1a1a" stroke-width="6"/>
  <g clip-path="url(#clip-11-4)">
    <rect x="0" y="0" width="750" height="1050" fill="#1f9aa8" opacity="0.09"/>
    <g opacity="0.20"><polygon points="417,352 282.6,545.2 371.64,545.2 333,688 467.4,494.8 378.36,494.8" fill="#1f9aa8"/></g>
    <rect x="0" y="0" width="750" height="150" fill="#1f9aa8"/>
    <polygon points="96.5,33 62.9,81.3 85.16,81.3 75.5,117 109.1,68.7 86.84,68.7" fill="#ffffff"/>
    
    <text x="150" y="68" fill="#fff" font-size="34" font-weight="bold" letter-spacing="2">GLOBAL</text>
    <text x="716" y="58" fill="#fff" font-size="30" font-weight="bold" text-anchor="end">x1</text>
    <text x="375" y="230" fill="#141414" font-size="48" font-weight="bold" text-anchor="middle"><tspan x="375" y="230">A Word in Your Ear</tspan></text>
    <line x1="48" y1="294" x2="702" y2="294" stroke="#cfc9bb" stroke-width="2"/>
    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">The active player cuts, lifts one card,</tspan><tspan x="48" y="363">and shows it to ONE player of their</tspan><tspan x="48" y="404">choice (and no one else), then slips it</tspan><tspan x="48" y="445">back. Make a deal, plant a lie, bait a</tspan><tspan x="48" y="486">rival.</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“Loyalty is a thing you trade in the</tspan><tspan x="375" y="780">dark.”</tspan></text>
    <rect x="48" y="852" width="654" height="150" rx="16" fill="#1f9aa81a" stroke="#1f9aa8" stroke-width="2.5"/>
    <text x="70" y="888" fill="#1f9aa8" font-size="22" font-weight="bold" letter-spacing="2">SCORING</text>
    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">No points -- fires the instant it surfaces;</tspan><tspan x="70" y="956">cannot be taken, sent, looted, or yeeted.</tspan></text>
  </g></g>
<g transform="translate(1575 1500)">  <defs><clipPath id="clip-11-5"><rect x="6" y="6" width="738" height="1038" rx="36"/></clipPath></defs>
  <rect x="6" y="6" width="738" height="1038" rx="36" fill="#fbfaf7" stroke="#1a1a1a" stroke-width="6"/>
  <g clip-path="url(#clip-11-5)">
    <rect x="0" y="0" width="750" height="1050" fill="#2f6fb0" opacity="0.09"/>
    <g opacity="0.20"><polygon points="375,352 543,657.76 207,657.76" fill="#2f6fb0"/></g>
    <rect x="0" y="0" width="750" height="150" fill="#2f6fb0"/>
    <polygon points="86,33 128,109.44 44,109.44" fill="#ffffff"/>
    <circle cx="150" cy="118" r="13" fill="#fff"/>
    <text x="185" y="68" fill="#fff" font-size="34" font-weight="bold" letter-spacing="2">UPGRADE  ·  ONE-SHOT</text>
    <text x="716" y="58" fill="#fff" font-size="30" font-weight="bold" text-anchor="end">x3</text>
    <text x="375" y="230" fill="#141414" font-size="48" font-weight="bold" text-anchor="middle"><tspan x="375" y="230">Temporal Shift</tspan></text>
    <line x1="48" y1="294" x2="702" y2="294" stroke="#cfc9bb" stroke-width="2"/>
    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">On your Fish: move any ONE card you</tspan><tspan x="48" y="363">peeked exactly 3 spaces up or down in</tspan><tspan x="48" y="404">the deck. Slip a rival hero behind his</tspan><tspan x="48" y="445">sidekick to star-cross them, or edge</tspan><tspan x="48" y="486">your own pair toward home.</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“A small shove in time. Three steps --</tspan><tspan x="375" y="780">enough to miss each other forever.”</tspan></text>
    <rect x="48" y="852" width="654" height="150" rx="16" fill="#2f6fb01a" stroke="#2f6fb0" stroke-width="2.5"/>
    <text x="70" y="888" fill="#2f6fb0" font-size="22" font-weight="bold" letter-spacing="2">SCORING</text>
    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">No points -- a ONE-SHOT ability.</tspan></text>
  </g></g>
</svg>