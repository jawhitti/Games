    <text x="185" y="68" fill="#fff" font-size="34" font-weight="bold" letter-spacing="2">UPGRADE  ·  ONE-SHOT</text>
    <text x="716" y="58" fill="#fff" font-size="30" font-weight="bold" text-anchor="end">x3</text>
    <text x="375" y="230" fill="#141414" font-size="48" font-weight="bold" text-anchor="middle"><tspan x="375" y="230">Temporal Shift</tspan></text>
    <line x1="48" y1="294" x2="702" y2="294" stroke="#cfc9bb" stroke-width="2"/>
    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">On your Fish: move any ONE card you</tspan><tspan x="48" y="363">peeked exactly 3 spaces up or down in</tspan><tspan x="48" y="404">the deck. Slip a rival hero behind his</tspan><tspan x="48" y="445">sidekick to star-cross them, or edge</tspan><tspan x="48" y="486">your own pair toward home.</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“A small shove in time. Three steps --</tspan><tspan x="375" y="780">enough to miss each other forever.”</tspan></text>
    <rect x="48" y="852" width="654" height="150" rx="16" fill="#2f6fb01a" stroke="#2f6fb0" stroke-width="2.5"/>
    <text x="70" y="888" fill="#2f6fb0" font-size="22" font-weight="bold" letter-spacing="2">SCORING</text>
    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">No points -- a ONE-SHOT ability.</tspan></text>
  </g></g>
