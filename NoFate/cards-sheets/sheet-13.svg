    <text x="185" y="68" fill="#fff" font-size="34" font-weight="bold" letter-spacing="2">UPGRADE  ·  ONE-SHOT</text>
    <text x="716" y="58" fill="#fff" font-size="30" font-weight="bold" text-anchor="end">x1</text>
    <text x="375" y="230" fill="#141414" font-size="48" font-weight="bold" text-anchor="middle"><tspan x="375" y="230">Bullet Time</tspan></text>
    <line x1="48" y1="294" x2="702" y2="294" stroke="#cfc9bb" stroke-width="2"/>
    <text x="48" y="322" fill="#2a2a2a" font-size="31"><tspan x="48" y="322">Play it to read the ENTIRE Present --</tspan><tspan x="48" y="363">all the committed cards, in order, so</tspan><tspan x="48" y="404">you know exactly what resolves next and</tspan><tspan x="48" y="445">on whose turn. Then take your turn</tspan><tspan x="48" y="486">normally. Peek-only; you never touch the</tspan><tspan x="48" y="527">Present.</tspan></text>
    <text x="375" y="745" fill="#6a6258" font-size="27" font-style="italic" text-anchor="middle"><tspan x="375" y="745">“You start to see it... the code behind</tspan><tspan x="375" y="780">the now.”</tspan></text>
