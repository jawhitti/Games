    <text x="70" y="888" fill="#d32f2f" font-size="22" font-weight="bold" letter-spacing="2">HOW YOU WIN</text>
    <text x="70" y="922" fill="#222" font-size="26"><tspan x="70" y="922">Kyle Reese starts in your hand; Sarah Connor</tspan><tspan x="70" y="956">is lost in the deck. Bring them home</tspan><tspan x="70" y="990">together for an INSTANT WIN.</tspan></text>
  </g></g>
